<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code RL Briefings</title>
  <style>
    body{font-family:system-ui;margin:0;background:#f7f5f0;color:#1b1b1b}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}
    .layout{display:grid;grid-template-columns:280px 1fr;gap:12px}
    .panel{background:#fff;border:1px solid #e5dfd4;border-radius:12px;padding:12px}
    .btn{display:block;width:100%;margin:0 0 8px;padding:10px;border:1px solid #ddd;border-radius:10px;background:#fff;text-align:left;cursor:pointer}
    .btn.active{border-color:#1d4ed8}
    .meta{color:#6b7280;font-size:12px}
    .email{white-space:pre-wrap;line-height:1.6;font-family:Georgia,serif}
    a{color:#1d4ed8;text-decoration:none}
    .signal{border:1px solid #e5dfd4;border-radius:10px;padding:10px;margin:0 0 8px}
    @media(max-width:900px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <h1>Code RL Briefings</h1>
  <p class="meta">View A: dated briefing runs · View B: global signals index.</p>
  <div class="layout">
    <aside class="panel">
      <h3>Dated runs</h3>
      <div id="runs"></div>
      <button class="btn" id="signalsBtn">Signals index</button>
    </aside>
    <section class="panel">
      <div id="runView">
        <h3 id="runTitle"></h3>
        <p class="meta" id="runMeta"></p>
        <h4>Original prompt</h4>
        <div id="runPrompt"></div>
        <h4>Briefing body</h4>
        <div id="runBody" class="email"></div>
      </div>
      <div id="signalsView" style="display:none">
        <h3>Global Signals Index</h3>
        <div id="signals"></div>
      </div>
    </section>
  </div>
</main>
<script>
const md = (t)=>t
  .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a target="_blank" href="$2">$1</a>')
  .replace(/\n/g,'<br/>');
let RUNS=[];
async function loadRun(r){
  const txt = await fetch(r.file).then(x=>x.text());
  runTitle.textContent = r.date + ' — ' + r.title;
  runMeta.textContent = r.source;
  runPrompt.textContent = r.prompt;
  runBody.innerHTML = md(txt);
  runView.style.display='block'; signalsView.style.display='none';
  document.querySelectorAll('.run-btn').forEach(b=>b.classList.toggle('active', b.dataset.id===r.id));
}
Promise.all([
  fetch('/data/briefings.json').then(r=>r.json()),
  fetch('/data/signals-global.json').then(r=>r.json())
]).then(async ([runs,signals])=>{
  RUNS = runs.sort((a,b)=>b.date.localeCompare(a.date));
  runsEl.innerHTML = RUNS.map(r=>`<button class="btn run-btn" data-id="${r.id}">${r.date}<div class="meta">${r.source}</div></button>`).join('');
  document.querySelectorAll('.run-btn').forEach(b=>b.onclick=()=>loadRun(RUNS.find(r=>r.id===b.dataset.id)));
  signalsEl.innerHTML = signals.map(s=>`<div class="signal"><strong>${s.name}</strong> <span class="meta">${s.role}</span><div>${Object.entries(s.links).map(([k,v])=>`<a target="_blank" href="${v}">${k}</a>`).join(' · ')}</div></div>`).join('');
  signalsBtn.onclick=()=>{runView.style.display='none';signalsView.style.display='block';};
  await loadRun(RUNS[0]);
});
const runsEl=document.getElementById('runs'),signalsEl=document.getElementById('signals');
const runView=document.getElementById('runView'),signalsView=document.getElementById('signalsView');
const runTitle=document.getElementById('runTitle'),runMeta=document.getElementById('runMeta');
const runPrompt=document.getElementById('runPrompt'),runBody=document.getElementById('runBody');
const signalsBtn=document.getElementById('signalsBtn');
</script>
</body>
</html>
